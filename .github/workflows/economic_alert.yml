name: Daily Economic Calendar Alert

on:
  schedule:
    # Two schedules to handle Daylight Saving Time automatically.
    # The Python script checks the actual MT clock and skips if it isn't 6 PM.
    #
    # 6 PM MDT (summer, UTC-6) = 00:00 UTC next day → runs Tue–Sat UTC (= Mon–Fri MDT)
    - cron: '0 0 * * 2-6'
    # 6 PM MST (winter, UTC-7) = 01:00 UTC next day → runs Tue–Sat UTC (= Mon–Fri MST)
    - cron: '0 1 * * 2-6'

  # Lets you trigger manually from the GitHub Actions UI (useful for testing)
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send economic calendar alert
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python alert.py
